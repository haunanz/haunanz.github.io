<!DOCTYPE html>
<html lang="zh-cn" class="light-theme">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Categories | 居然是你的的博客呀</title>
    <meta name="description" content="居然是你的的博客呀">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/syntax.css">
    <link rel="stylesheet" href="/css/toc.css">
    <link rel="stylesheet" href="/css/content.css">
    <script>
        
        document.addEventListener('DOMContentLoaded', function() {
            const themeToggle = document.getElementById('theme-toggle');
            if (themeToggle) {
                themeToggle.addEventListener('click', function() {
                    const html = document.documentElement;
                    if (html.classList.contains('light-theme')) {
                        html.classList.remove('light-theme');
                        html.classList.add('dark-theme');
                        localStorage.setItem('theme', 'dark');
                    } else {
                        html.classList.remove('dark-theme');
                        html.classList.add('light-theme');
                        localStorage.setItem('theme', 'light');
                    }
                });
            }

            
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.classList.remove('light-theme', 'dark-theme');
            document.documentElement.classList.add(savedTheme + '-theme');
        });
    </script>
</head>
<body>
    <div class="container">
        
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="https://haunanz.github.io/" class="blog-title">居然是你的的博客呀</a>

                </ul>
                <div class="theme-switcher">
                    <button id="theme-toggle" aria-label="切换主题">
                        <span class="theme-icon">🌓</span>
                    </button>
                </div>
            </nav>
        </aside>

        
        <main class="content">
            
<h1 style="margin-bottom: 2rem;">Categories</h1>

</body>
