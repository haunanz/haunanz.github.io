<!DOCTYPE html>
<html lang="zh-cn" class="light-theme">
<head><script src="/livereload.js?mindelay=10&amp;v=2&amp;port=59185&amp;path=livereload" data-no-instant defer></script>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>搜索 | Haunanz的博客</title>
    <meta name="description" content="一个简单的个人博客">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/syntax.css">
    <link rel="stylesheet" href="/css/toc.css">
    <link rel="stylesheet" href="/css/content.css">
    <script>
        
        document.addEventListener('DOMContentLoaded', function() {
            const themeToggle = document.getElementById('theme-toggle');
            if (themeToggle) {
                themeToggle.addEventListener('click', function() {
                    const html = document.documentElement;
                    if (html.classList.contains('light-theme')) {
                        html.classList.remove('light-theme');
                        html.classList.add('dark-theme');
                        localStorage.setItem('theme', 'dark');
                    } else {
                        html.classList.remove('dark-theme');
                        html.classList.add('light-theme');
                        localStorage.setItem('theme', 'light');
                    }
                });
            }

            
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.classList.remove('light-theme', 'dark-theme');
            document.documentElement.classList.add(savedTheme + '-theme');
        });
    </script>
</head>
<body>
    <div class="container">
        
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="http://localhost:59185/" class="blog-title">Haunanz的博客</a>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    
                    <li><a href="/posts/" >所有文章</a></li>
                    
                    <li><a href="/tags/" >标签</a></li>
                    
                    <li><a href="/categories/" >分类</a></li>
                    
                    <li><a href="/search/" class="active">搜索</a></li>
                    
                    <li><a href="/about/" >关于</a></li>
                    
                </ul>
                <div class="theme-switcher">
                    <button id="theme-toggle" aria-label="切换主题">
                        <span class="theme-icon">🌓</span>
                    </button>
                </div>
            </nav>
        </aside>

        
        <main class="content">
            
<div class="article-wrapper">
    
    <div class="toc-container">
        <div class="toc-header">目录</div>
        <nav id="table-of-contents" class="toc" aria-label="文章目录">
            
        </nav>
    </div>

    <article class="article">
        <header class="article-header">
            <h1 class="article-title">搜索</h1>
            <div class="article-meta">
                <time datetime="0001-01-01T00:00:00Z">0001-01-01</time>
                
            </div>
        </header>
        <div class="article-content">
            
        </div>
    </article>

  
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    
    const headings = document.querySelectorAll('.article-content h2, .article-content h3, .article-content h4, .article-content h5, .article-content h6');
    if (headings.length === 0) {
        document.querySelector('.toc-container').style.display = 'none';
        return;
    }

    const toc = document.getElementById('table-of-contents');

    
    const tocList = document.createElement('ul');
    tocList.className = 'toc-list';
    toc.appendChild(tocList);

    headings.forEach((heading, index) => {
        
        const level = parseInt(heading.tagName.charAt(1));

        
        if (!heading.id) {
            heading.id = 'heading-' + index;
        }

        
        const link = document.createElement('a');
        link.href = '#' + heading.id;
        link.textContent = heading.textContent;
        link.className = 'toc-link';

        
        const li = document.createElement('li');
        li.className = 'toc-item';
        li.appendChild(link);

        
        li.classList.add('toc-level-' + level);

        
        tocList.appendChild(li);

        
        const anchor = document.createElement('a');
        anchor.className = 'heading-anchor';
        anchor.href = '#' + heading.id;
        anchor.innerHTML = '#';
        anchor.style.marginLeft = '0.5rem';
        anchor.style.opacity = '0';
        anchor.style.transition = 'opacity 0.2s';
        anchor.style.textDecoration = 'none';
        anchor.style.color = 'var(--light-link)';
        heading.style.position = 'relative';
        heading.appendChild(anchor);

        
        heading.addEventListener('mouseenter', function() {
            anchor.style.opacity = '1';
        });
        heading.addEventListener('mouseleave', function() {
            anchor.style.opacity = '0';
        });
    });

    
    function highlightTocOnScroll() {
        const tocLinks = document.querySelectorAll('.toc-link');
        let currentActive = null;

        
        for (let i = headings.length - 1; i >= 0; i--) {
            const heading = headings[i];
            const rect = heading.getBoundingClientRect();
            if (rect.top <= 150) { 
                currentActive = heading.id;
                break;
            }
        }

        
        tocLinks.forEach(link => {
            link.classList.remove('active');
            if (link.getAttribute('href') === '#' + currentActive) {
                link.classList.add('active');

                
                const tocContainer = document.querySelector('.toc-container');
                const linkRect = link.getBoundingClientRect();
                const containerRect = tocContainer.getBoundingClientRect();

                if (linkRect.bottom > containerRect.bottom || linkRect.top < containerRect.top) {
                    link.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }
        });
    }

    
    window.addEventListener('scroll', highlightTocOnScroll);
    highlightTocOnScroll(); 

    
    document.querySelectorAll('.toc-link').forEach(link => {
        link.addEventListener('click', function(e) {
            e.preventDefault();
            const targetId = this.getAttribute('href');
            const targetElement = document.querySelector(targetId);
            if (targetElement) {
                const headerHeight = document.querySelector('.sidebar').offsetHeight;
                const targetPosition = targetElement.offsetTop - headerHeight - 20;

                window.scrollTo({
                    top: targetPosition,
                    behavior: 'smooth'
                });

                
                history.pushState(null, null, targetId);
            }
        });
    });
});
</script>

</body>
</html>
